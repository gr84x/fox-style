# Publish @gr84x/fox-style to the GR84X private npm registry when changes are merged to the default branch.
# Requires NPM_TOKEN repository secret (registry auth token for https://npm.gr84x.com/).

name: Publish to private npm

on:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Configure registry auth
        run: |
          echo "//npm.gr84x.com/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        run: npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
